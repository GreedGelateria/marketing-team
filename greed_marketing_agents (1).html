<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GREED — AI Marketing Team</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--cream:#F5F0E8;--espresso:#1C1410;--caramel:#C17D3C;--cl:#E8A55A;--border:rgba(28,20,16,0.12);--r:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--espresso);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;}
header{background:var(--espresso);color:var(--cream);padding:16px 24px;display:flex;align-items:center;gap:16px;border-bottom:3px solid var(--caramel);}
.logo{width:40px;height:40px;background:var(--caramel);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:900;font-size:17px;color:var(--espresso);flex-shrink:0;}
header h1{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;}
header p{font-size:11px;opacity:.5;margin-top:1px;}
.hbadge{margin-left:auto;background:rgba(193,125,60,.2);border:1px solid var(--caramel);color:var(--cl);font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;white-space:nowrap;}
.tabs{display:flex;background:var(--espresso);padding:0 16px;overflow-x:auto;gap:0;}
.tab{padding:11px 14px;font-size:12px;font-weight:500;color:rgba(245,240,232,.4);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;user-select:none;flex-shrink:0;}
.tab:hover{color:rgba(245,240,232,.75);}
.tab.active{color:var(--cream);border-bottom-color:var(--caramel);}
.main{max-width:900px;margin:0 auto;padding:28px 20px 100px;}
.panel{display:none;}.panel.active{display:block;}
.ah{display:flex;align-items:flex-start;gap:14px;margin-bottom:24px;}
.ai{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.an{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}
.ad{font-size:12px;color:#6B6057;margin-top:2px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.fgo{display:flex;flex-direction:column;gap:5px;}
label{font-size:11px;font-weight:500;letter-spacing:.04em;color:#7A6E66;text-transform:uppercase;}
input[type=text],textarea,select{background:#fff;border:1px solid var(--border);border-radius:9px;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--espresso);width:100%;resize:vertical;}
input[type=text]:focus,textarea:focus,select:focus{outline:none;border-color:var(--caramel);box-shadow:0 0 0 3px rgba(193,125,60,.1);}
textarea{min-height:75px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.chip{background:#fff;border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;color:var(--espresso);user-select:none;}
.chip:hover{background:var(--espresso);color:var(--cream);}
.chip.on{background:var(--caramel);color:#fff;border-color:var(--caramel);}
.tbr{display:flex;gap:7px;flex-wrap:wrap;}
.tb{padding:5px 13px;border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;background:#fff;transition:all .15s;user-select:none;}
.tb.on{background:var(--espresso);color:var(--cream);}
.stars{display:flex;gap:3px;margin-bottom:8px;}
.star{font-size:22px;cursor:pointer;color:#D0C8C0;transition:color .1s;}.star.on{color:var(--caramel);}
.btn{width:100%;background:var(--espresso);color:var(--cream);border:none;border-radius:10px;padding:13px 20px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:18px;}
.btn:hover{background:#2E261F;}.btn:disabled{opacity:.5;cursor:not-allowed;}
.spin{width:15px;height:15px;border:2px solid rgba(245,240,232,.3);border-top-color:var(--cream);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.out{margin-top:20px;background:#fff;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;display:none;}
.out.show{display:block;}
.outh{background:var(--espresso);color:var(--cream);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;font-size:11px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;}
.cpbtn{background:rgba(245,240,232,.1);border:1px solid rgba(245,240,232,.2);color:var(--cream);padding:3px 9px;border-radius:5px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.vars{padding:16px;display:flex;flex-direction:column;gap:14px;}
.vc{border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.vl{background:var(--cream);padding:7px 12px;font-size:11px;font-weight:500;color:#7A6E66;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.vb{padding:13px;font-size:14px;line-height:1.75;color:var(--espresso);white-space:pre-wrap;word-break:break-word;}
.vcpbtn{background:var(--cream);border:1px solid var(--border);color:#7A6E66;padding:2px 8px;border-radius:5px;font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.vcpbtn:hover{background:var(--espresso);color:var(--cream);}
.ltxt{padding:28px 16px;text-align:center;color:#7A6E66;font-size:14px;}
.ldots::after{content:'';animation:dots 1.5s steps(4,end) infinite;}
@keyframes dots{0%{content:'';}25%{content:'.';}50%{content:'..';}75%{content:'...';};}
.stl{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:#9A8E86;margin-bottom:8px;}
hr.d{border:none;border-top:1px solid var(--border);margin:20px 0;}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px;}
.tag{background:var(--caramel);color:#fff;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;display:flex;align-items:center;gap:4px;}
.tagrm{cursor:pointer;opacity:.7;font-size:9px;}
.hint{font-size:11px;color:#9A8E86;}
.bridge{width:100%;background:rgba(193,125,60,.1);border:1px solid rgba(193,125,60,.3);color:var(--caramel);border-radius:8px;padding:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:10px;}
.bridge:hover{background:rgba(193,125,60,.2);}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--espresso);color:var(--cream);padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;border-left:3px solid var(--caramel);box-shadow:0 4px 20px rgba(0,0,0,.3);white-space:nowrap;pointer-events:none;}
.apibar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--espresso);color:var(--cream);padding:12px 20px;align-items:center;gap:10px;z-index:999;border-top:3px solid var(--caramel);}
.apibar input{flex:1;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:7px 12px;color:var(--cream);font-size:13px;font-family:'DM Sans',sans-serif;}
.apibar button{background:var(--caramel);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.info{background:#F9F5F0;border-left:3px solid var(--caramel);padding:12px 14px;border-radius:8px;margin-bottom:20px;font-size:13px;line-height:1.7;color:#4A3F38;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.mbox{border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;}
.mlbl{font-size:10px;color:#9A8E86;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
.mval{font-size:13px;font-weight:600;}
.upload-zone{border:2px dashed var(--caramel);border-radius:var(--r);background:rgba(193,125,60,.04);padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s;position:relative;}
.upload-zone:hover{background:rgba(193,125,60,.09);}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.fmt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin:14px 0;}
.fmt{border:1.5px solid var(--border);border-radius:10px;padding:10px;cursor:pointer;transition:all .15s;background:#fff;text-align:center;user-select:none;}
.fmt:hover,.fmt.on{border-color:var(--caramel);background:#FDF8F2;}
.fv{margin:0 auto 6px;background:var(--caramel);border-radius:3px;opacity:.65;}
.fn{font-size:12px;font-weight:500;}
.fs{font-size:10px;color:#9A8E86;margin-top:1px;}
.prog{display:none;margin-top:12px;}
.prog.show{display:block;}
.progbar{background:rgba(28,20,16,.08);border-radius:6px;height:8px;overflow:hidden;}
.progfill{height:100%;background:var(--caramel);border-radius:6px;transition:width .3s;width:0%;}
.proglbl{font-size:12px;color:#7A6E66;margin-top:5px;}
.expgrid{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
.expbtn{display:flex;align-items:center;gap:6px;background:var(--espresso);color:var(--cream);border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;}
.aibox{background:#F9F5F0;border:1px solid rgba(193,125,60,.2);border-radius:10px;padding:14px;margin-top:12px;font-size:13px;line-height:1.7;display:none;}
.aibox.show{display:block;}
.ailbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--caramel);margin-bottom:5px;}
.aibadge{display:inline-block;background:#F0EAF8;color:#7C4DAA;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;margin-top:5px;}
.prevbox{background:#1C1410;color:#E8DDD0;font-family:Menlo,Monaco,monospace;font-size:11px;line-height:1.7;padding:14px;border-radius:8px;white-space:pre-wrap;max-height:180px;overflow-y:auto;margin-top:8px;}
.savedmsg{display:none;margin-top:12px;background:rgba(107,124,94,.15);border:1px solid #6B7C5E;color:#4A5A3E;padding:10px 14px;border-radius:8px;font-size:13px;}
.ddt-mit{background:#F9F5F0;border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px;}
.ddt-mit input{border:none;border-bottom:1px solid var(--border);background:transparent;padding:0 4px;font-size:13px;width:150px;color:var(--espresso);}
.ddt-cols{display:grid;grid-template-columns:3fr 1fr 1fr auto;gap:6px;align-items:center;}
.ddt-hdr{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#9A8E86;font-weight:500;}
.hist-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:#fff;border:1px solid var(--border);border-radius:10px;margin-bottom:7px;}
.hist-btns{display:flex;gap:7px;}
.hbtn{background:var(--espresso);color:var(--cream);border:none;border-radius:6px;padding:5px 11px;font-size:12px;cursor:pointer;font-family:inherit;}
.hbtn2{background:transparent;border:1px solid var(--border);color:#9A8E86;border-radius:6px;padding:5px 9px;font-size:12px;cursor:pointer;font-family:inherit;}
.ins-tbl{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px;}
.ins-row{display:grid;grid-template-columns:1fr 80px 55px 55px 55px 55px 28px;gap:6px;padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;align-items:center;}
.ins-hdr{background:var(--cream);font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#7A6E66;font-weight:500;}
@media(max-width:600px){.fg{grid-template-columns:1fr;}.main{padding:20px 14px 100px;}.g4{grid-template-columns:1fr 1fr;}.tabs{padding:0 8px;}}
</style>
</head>
<body>

<header>
  <div class="logo">G</div>
  <div><h1>GREED — AI Marketing Team</h1><p>Gelateria GREED · Frascati, Piazza Roma 16</p></div>
  <div class="hbadge" id="hbadge">16 Agenti · Sistema Completo</div>
</header>

<div class="tabs" id="tabs-bar"></div>

<div class="main" id="main-area"></div>

<!-- API KEY BAR -->
<div class="apibar" id="apibar">
  <span style="font-size:13px;flex-shrink:0">🔑 API Key:</span>
  <input type="password" id="api-inp" placeholder="sk-ant-api03-...">
  <button onclick="saveKey()">Salva</button>
  <span style="font-size:11px;opacity:.5;flex-shrink:0">Solo nel tuo browser</span>
</div>

<script>
// ================================================================
// GREED AI MARKETING TEAM — v4 Clean
// ================================================================

// ── State ──────────────────────────────────────────────────────
const S = {
  gusti: [],
  tone: { content:'Caldo & poetico', crm:'Caldo', seo:'Calorosa', cal:'', strategist:'Completo (12 settimane)', carousel:'Documentario', commenti:'Amichevole', email:'Cordiale', competitor:'Strategico', traduzioni:'Solo inglese' },
  canale: 'Instagram Post',
  loyalty: 'Tutti',
  vars: ['{{nome}}'],
  kw: ['gelateria Frascati','senza glutine'],
  calCanali: ['Instagram','WhatsApp Club'],
  promoCanali: ['Instagram','WhatsApp Club'],
  voiceChips: ['Autentico','Locale'],
  stars: 5,
  mediaFile: null,
  mediaAnalysis: '',
  insightDB: JSON.parse(localStorage.getItem('greed_ins') || '[]'),
  ddtStorico: JSON.parse(localStorage.getItem('greed_ddt') || '[]'),
  ddtRighe: []
};

const TABS = [
  {id:'locker',   icon:'🧬', label:'Brand Core'},
  {id:'strat',    icon:'🎯', label:'Strategist'},
  {id:'carousel', icon:'🎠', label:'Carousel'},
  {id:'insight',  icon:'📊', label:'Insight'},
  {id:'crisis',   icon:'🚨', label:'Crisis'},
  {id:'content',  icon:'✍️',  label:'Content'},
  {id:'crm',      icon:'💌', label:'CRM'},
  {id:'seo',      icon:'⭐', label:'SEO'},
  {id:'cal',      icon:'📅', label:'Calendario'},
  {id:'media',    icon:'🎨', label:'Media'},
  {id:'commenti', icon:'💬', label:'Commenti'},
  {id:'menu',     icon:'🍦', label:'Menu'},
  {id:'email',    icon:'📧', label:'Email'},
  {id:'promo',    icon:'🎯', label:'Promozioni'},
  {id:'comp',     icon:'🔍', label:'Competitor'},
  {id:'trad',     icon:'🌍', label:'Traduzioni'},
  {id:'ddt',      icon:'📦', label:'DDT'},
];

// ── API ────────────────────────────────────────────────────────
function getKey(){ return localStorage.getItem('greed_key') || ''; }
function saveKey(){ const v=document.getElementById('api-inp').value.trim(); if(!v.startsWith('sk-ant-')){alert('Chiave non valida');return;} localStorage.setItem('greed_key',v); document.getElementById('apibar').style.display='none'; toast('API Key salvata ✓'); }
function checkKey(){ if(!getKey()) document.getElementById('apibar').style.display='flex'; }

function sysPrompt(extra=''){
  const core = JSON.parse(localStorage.getItem('greed_core')||'{}');
  const strat = localStorage.getItem('greed_strat')||'';
  const ins = localStorage.getItem('greed_ins_summary')||'';
  let s = `Sei il copywriter ufficiale di Gelateria GREED a Frascati (Piazza Roma 16). GREED è gelateria artigianale 100% senza glutine, premiata da Gambero Rosso come Miglior Gelato Gastronomico. Ingredienti km-0 Castelli Romani, opzioni vegane. Scrivi in italiano impeccabile. Rispondi SOLO con il testo richiesto.`;
  if(core.banned) s+=`\n⚠️ PAROLE VIETATE (mai usare): ${core.banned}`;
  if(core.signature) s+=`\nParole da privilegiare: ${core.signature}`;
  if(core.bigidea) s+=`\nBig Idea brand: "${core.bigidea}"`;
  if(core.voice && core.voice.length) s+=`\nTono: ${core.voice.join(', ')}`;
  if(strat) s+=`\n[STRATEGIA ATTIVA] ${strat.slice(0,600)}`;
  if(ins) s+=`\n[CONTENUTI VINCENTI] ${ins.slice(0,300)}`;
  if(extra) s+=`\n${extra}`;
  return s;
}

async function ask(prompt, maxTok=1200, extra=''){
  if(!getKey()){checkKey();throw new Error('API Key mancante');}
  const ctrl = new AbortController();
  const tid = setTimeout(()=>ctrl.abort(), 35000);
  try{
    const r = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', signal:ctrl.signal,
      headers:{'Content-Type':'application/json','x-api-key':getKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:maxTok,system:sysPrompt(extra),messages:[{role:'user',content:prompt}]})
    });
    clearTimeout(tid);
    const d = await r.json();
    if(!r.ok) throw new Error(d.error?.message||'Errore API');
    return d.content[0].text.trim();
  }catch(e){ clearTimeout(tid); if(e.name==='AbortError') throw new Error('Timeout — riprova'); throw e; }
}

async function askVision(b64, prompt){
  if(!getKey()){checkKey();throw new Error('API Key mancante');}
  const ctrl = new AbortController();
  const tid = setTimeout(()=>ctrl.abort(), 40000);
  try{
    const r = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', signal:ctrl.signal,
      headers:{'Content-Type':'application/json','x-api-key':getKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:400,system:'Sei il social media manager di Gelateria GREED, Frascati. Rispondi in italiano, conciso.',messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},{type:'text',text:prompt}]}]})
    });
    clearTimeout(tid);
    const d = await r.json();
    if(!r.ok) throw new Error(d.error?.message||'Errore Vision');
    return d.content[0].text.trim();
  }catch(e){ clearTimeout(tid); if(e.name==='AbortError') throw new Error('Timeout Vision'); throw e; }
}

// ── UI Helpers ─────────────────────────────────────────────────
function toast(msg, from=''){
  const el = document.createElement('div');
  el.className='toast';
  el.innerHTML = from ? `<span style="color:var(--caramel);font-weight:600">${from}</span> ${msg}` : msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}

function switchTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.id===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active', p.id==='p-'+id));
  if(id==='ddt') initDDT();
  if(id==='insight') renderInsDB();
  if(id==='locker') loadLocker();
}

function setLoading(btnId, outId, on){
  const btn=document.getElementById(btnId);
  if(!btn)return;
  if(on){
    btn.disabled=true;
    btn._lbl=btn.innerHTML;
    btn.innerHTML='<div class="spin"></div><span>Generando...</span>';
    const out=document.getElementById(outId);
    if(out){out.classList.add('show');out.querySelector('.vars').innerHTML='<div class="ltxt"><span class="ldots">Sto scrivendo</span></div>';}
  }else{
    btn.disabled=false;
    if(btn._lbl) btn.innerHTML=btn._lbl;
  }
}

function showResult(containerId, variants){
  const L=['Variante A','Variante B','Variante C'];
  document.getElementById(containerId).innerHTML = variants.map((v,i)=>`
    <div class="vc">
      <div class="vl"><span>${variants.length>1?L[i]:'Risultato'}</span><button class="vcpbtn" onclick="cpv(this)">Copia</button></div>
      <div class="vb">${esc(v)}</div>
    </div>`).join('');
}

function showErr(containerId, msg){
  document.getElementById(containerId).innerHTML=`<div class="ltxt" style="color:#c0392b">⚠️ ${esc(msg)}</div>`;
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function cpv(btn){
  const t=btn.closest('.vc').querySelector('.vb').textContent;
  navigator.clipboard.writeText(t).catch(()=>{});
  btn.textContent='✓'; setTimeout(()=>btn.textContent='Copia',1800);
}

function cpAll(outId){
  const t=[...document.querySelectorAll(`#${outId} .vb`)].map(e=>e.textContent).join('\n\n---\n\n');
  navigator.clipboard.writeText(t).catch(()=>{});
  toast('Copiato ✓');
}

function chip(el, group){
  const single=['canale','loyalty'].includes(group);
  if(single){
    el.closest('.chips').querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
    el.classList.add('on');
    if(group==='canale') S.canale=el.textContent;
    if(group==='loyalty') S.loyalty=el.textContent;
  }else{
    el.classList.toggle('on');
    if(group==='vars') S.vars=[...document.querySelectorAll('#chips-vars .chip.on')].map(c=>c.textContent);
    if(group==='kw') S.kw=[...document.querySelectorAll('#chips-kw .chip.on')].map(c=>c.textContent);
    if(group==='cal-ch') S.calCanali=[...document.querySelectorAll('#chips-cal .chip.on')].map(c=>c.textContent);
    if(group==='promo-ch') S.promoCanali=[...document.querySelectorAll('#chips-promo .chip.on')].map(c=>c.textContent);
    if(group==='voice') S.voiceChips=[...document.querySelectorAll('#chips-voice .chip.on')].map(c=>c.textContent);
    if(group==='wm') {}
  }
}

function setTone(el, agent){
  el.closest('.tbr').querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  S.tone[agent]=el.textContent;
}

function setStar(n){
  S.stars=n;

// ── Compress image ─────────────────────────────────────────────
function compressImg(file, maxMB=3.5){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const max=1200; let w=img.width,h=img.height;
      if(w>max||h>max){const sc=max/Math.max(w,h);w=Math.round(w*sc);h=Math.round(h*sc);}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      let q=0.85;
      const go=()=>{
        const d=canvas.toDataURL('image/jpeg',q);
        const b=d.split(',')[1];
        if(b.length*0.75<=maxMB*1048576||q<=0.3) res(b);
        else{q-=0.15;go();}
      };
      go();
    };
    img.onerror=rej;
    img.src=URL.createObjectURL(file);
  });
}

function initDDT(){
  const now=new Date();
  document.getElementById('ddt-data').value=now.toLocaleDateString('it-IT');

  const n=getDDTN(); document.getElementById('ddt-num').textContent='GREED/'+now.getFullYear()+'/'+String(n).padStart(4,'0');
  if(!S.ddtRighe.length) addRiga();
  renderStorico();
}

function getDDTN(){ return parseInt(localStorage.getItem('greed_ddt_c')||'0')+1; }

function addRiga(){
  const id=Date.now(); S.ddtRighe.push(id);
  const d=document.createElement('div');
  d.id='riga-'+id; d.className='ddt-cols'; d.style.marginBottom='6px';
  d.innerHTML=`<input type="text" placeholder="Es: Gelato Pistacchio di Bronte..." style="border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:13px;font-family:'DM Sans',sans-serif"><input type="text" placeholder="2" style="border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:13px;font-family:'DM Sans',sans-serif;text-align:center"><select style="border:1px solid var(--border);border-radius:7px;padding:7px 6px;font-size:12px;font-family:'DM Sans',sans-serif"><option>Kg</option><option>Lt</option><option>Pz</option><option>Vasch.</option></select><button onclick="rmRiga(${id})" style="background:none;border:none;color:var(--caramel);font-size:16px;cursor:pointer;padding:0 6px">✕</button>`;
  document.getElementById('ddt-righe').appendChild(d);
}

function rmRiga(id){ document.getElementById('riga-'+id)?.remove(); S.ddtRighe=S.ddtRighe.filter(r=>r!==id); }

function getRighe(){ return [...document.querySelectorAll('#ddt-righe > div')].map(d=>{const i=d.querySelectorAll('input,select');return{desc:i[0]?.value.trim(),qty:i[1]?.value||'—',um:i[2]?.value};}).filter(r=>r.desc); }

function generaDDT(){
  const righe=getRighe();
  if(!righe.length){alert('Aggiungi almeno un prodotto');return;}
  const dest=document.getElementById('ddt-dest').value.trim();
  if(!dest){alert('Inserisci il destinatario');return;}
  const now=new Date();
  const n=getDDTN(); localStorage.setItem('greed_ddt_c',n);
  const ddt={id:Date.now(),numero:'GREED/'+now.getFullYear()+'/'+String(n).padStart(4,'0'),data:document.getElementById('ddt-data').value,ora:document.getElementById('ddt-ora').value,dest,vettore:document.getElementById('ddt-vett').value,causale:document.getElementById('ddt-caus').value,aspetto:document.getElementById('ddt-asp').value,temp:document.getElementById('ddt-temp').value,note:document.getElementById('ddt-note').value,piva:document.getElementById('ddt-piva').value,tel:document.getElementById('ddt-tel').value,righe};
  S.ddtStorico.unshift(ddt); localStorage.setItem('greed_ddt',JSON.stringify(S.ddtStorico));
  stampaDDT(ddt); renderStorico();
  S.ddtRighe=[]; document.getElementById('ddt-righe').innerHTML='';
  document.getElementById('ddt-dest').value=''; document.getElementById('ddt-note').value='';
  addRiga();
}

function renderStorico(){
  const el=document.getElementById('ddt-storico'); if(!el)return;
  if(!S.ddtStorico.length){el.innerHTML='<div class="ltxt">Nessun DDT salvato</div>';return;}
  el.innerHTML=S.ddtStorico.map(d=>`<div class="hist-item"><div><div style="font-weight:500;font-size:13px">${d.numero}</div><div style="font-size:12px;color:#9A8E86;margin-top:2px">${d.data} · ${d.dest.split('\n')[0]} · ${d.righe.length} prodott${d.righe.length===1?'o':'i'}</div></div><div class="hist-btns"><button class="hbtn" onclick='stampaDDT(${JSON.stringify(d).replace(/'/g,"&#39;")})'>📄 PDF</button><button class="hbtn2" onclick="rmDDT(${d.id})">✕</button></div></div>`).join('');

function rmDDT(id){ if(!confirm('Eliminare?'))return; S.ddtStorico=S.ddtStorico.filter(d=>d.id!==id); localStorage.setItem('greed_ddt',JSON.stringify(S.ddtStorico)); renderStorico(); }

// ── Media ──────────────────────────────────────────────────────
function onFile(e){ const f=e.target.files[0]||e.dataTransfer?.files[0]; if(f) handleMedia(f); }
function onDrop(e){ e.preventDefault(); document.getElementById('uz').classList.remove('dz'); const f=e.dataTransfer.files[0]; if(f) handleMedia(f); }

async function handleMedia(file){
  if(!file.type.startsWith('image/')&&!file.type.startsWith('video/')){alert('Formato non supportato');return;}
  S.mediaFile=file;
  const isVid=file.type.startsWith('video/');
  document.getElementById('m-fname').textContent=file.name;
  document.getElementById('m-fmeta').textContent=file.type.split('/')[1].toUpperCase()+' · '+(file.size/1048576).toFixed(1)+' MB';
  document.getElementById('m-preview').style.display='flex';
  const img=document.getElementById('m-img'); const vid=document.getElementById('m-vid');
  if(isVid){img.style.display='none';vid.style.display='block';vid.src=URL.createObjectURL(file);}
  else{vid.style.display='none';img.style.display='block';img.src=URL.createObjectURL(file); analyzeMedia(file);}
  document.getElementById('btn-media').disabled=false;
}

async function analyzeMedia(file){
  const badge=document.getElementById('m-badge');
  badge.style.display='inline-block'; badge.textContent='✦ Analisi in corso...';
  let secs=0; const tick=setInterval(()=>{secs++;badge.textContent=`✦ Analisi... ${secs}s`;},1000);
  try{
    const b64=await compressImg(file,3.5);
    const raw=await askVision(b64,`Analizza questa immagine di gelato. Rispondi ESATTAMENTE così:\nGUSTO: [nome]\nDESCRIZIONE: [cosa vedi, 1 riga]\nPUNTO_FORZA: [punto di forza visivo]\nHASHTAG: [6 hashtag]`);
    clearInterval(tick);
    const gusto=raw.match(/GUSTO:\s*(.+)/)?.[1]?.trim()||'';
    const desc=raw.match(/DESCRIZIONE:\s*(.+)/)?.[1]?.trim()||'';
    const forza=raw.match(/PUNTO_FORZA:\s*(.+)/)?.[1]?.trim()||'';
    const hashtag=raw.match(/HASHTAG:\s*(.+)/)?.[1]?.trim()||'';
    S.mediaAnalysis={gusto,desc,forza,hashtag};
    document.getElementById('m-aitext').innerHTML=`<strong>Gusto:</strong> ${esc(gusto)}<br><strong>Contenuto:</strong> ${esc(desc)}<br><strong>Punto di forza:</strong> ${esc(forza)}<br><strong>Hashtag:</strong> <span style="color:var(--caramel)">${esc(hashtag)}</span>`;
    document.getElementById('m-aibox').classList.add('show');
    badge.textContent='✦ Analisi completata ✓';
    if(gusto&&!S.gusti.includes(gusto)){S.gusti.push(gusto);}
  }catch(e){clearInterval(tick);badge.textContent='✦ Errore: '+e.message;document.getElementById('m-aitext').textContent='Errore: '+e.message;document.getElementById('m-aibox').classList.add('show');}
}

async function processMedia(){
  if(!S.mediaFile){alert('Carica prima un file');return;}
  const fmts=[...document.querySelectorAll('.fmt.on')].map(f=>({w:+f.dataset.w,h:+f.dataset.h,name:f.dataset.name}));
  if(!fmts.length){alert('Seleziona almeno un formato');return;}
  document.getElementById('btn-media').disabled=true;
  document.getElementById('btn-media').innerHTML='<div class="spin"></div><span>Elaborazione...</span>';
  const prog=document.getElementById('m-prog'); prog.classList.add('show');
  const bar=document.getElementById('m-bar'); const lbl=document.getElementById('m-lbl');
  const expGrid=document.getElementById('m-exp'); expGrid.innerHTML='';
  const wm=[...document.querySelectorAll('#chips-wm .chip.on')].map(c=>c.textContent).filter(w=>w!=='Nessuno');
  if(S.mediaFile.type.startsWith('image/')){
    for(let i=0;i<fmts.length;i++){
      const fmt=fmts[i]; lbl.textContent=`Elaboro ${fmt.name}...`; bar.style.width=Math.round(i/fmts.length*100)+'%';
      await new Promise(r=>setTimeout(r,50));
      const canvas=document.createElement('canvas'); canvas.width=fmt.w; canvas.height=fmt.h;
      const ctx=canvas.getContext('2d');
      await new Promise(r=>{const img=new Image();img.onload=()=>{const sc=Math.max(fmt.w/img.width,fmt.h/img.height);const sw=img.width*sc,sh=img.height*sc;ctx.drawImage(img,(fmt.w-sw)/2,(fmt.h-sh)/2,sw,sh);if(wm.length){const g=ctx.createLinearGradient(0,fmt.h-100,0,fmt.h);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.65)');ctx.fillStyle=g;ctx.fillRect(0,fmt.h-100,fmt.w,100);ctx.fillStyle='#fff';const fs=Math.round(fmt.w*.052);ctx.font=`900 ${fs}px Georgia,serif`;ctx.textAlign='left';ctx.fillText('GREED',fmt.w*.05,fmt.h-fmt.w*.035);const badges=wm.filter(x=>x!=='Logo GREED');if(badges.length){ctx.font=`400 ${Math.round(fs*.46)}px sans-serif`;ctx.fillStyle='rgba(255,255,255,.7)';ctx.fillText(badges.join(' · '),fmt.w*.05,fmt.h-fmt.w*.01);}}r();};img.src=URL.createObjectURL(S.mediaFile);});
      const url=canvas.toDataURL('image/jpeg',.92);
      const a=document.createElement('a'); a.className='expbtn'; a.download=`GREED_${fmt.name.replace(/\s/g,'_')}_${fmt.w}x${fmt.h}.jpg`; a.href=url; a.innerHTML=`⬇ ${fmt.name} <span style="opacity:.5;font-size:10px">${fmt.w}×${fmt.h}</span>`; expGrid.appendChild(a);
    }
    bar.style.width='100%'; lbl.textContent=`✓ ${fmts.length} formati pronti`;
  }else{
    bar.style.width='100%'; lbl.textContent='Scheda formati video generata';
    const div=document.createElement('div'); div.style.cssText='width:100%;background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;font-size:13px;line-height:1.9';
    div.innerHTML='<div style="font-weight:500;margin-bottom:10px">📋 Specifiche per ogni piattaforma:</div>'+fmts.map(f=>`<div style="padding:6px 0;border-bottom:1px solid var(--border)"><strong>${f.name}</strong> — ${f.w}×${f.h}<br><span style="color:#7A6E66;font-size:12px">MP4 H.264 · ${f.name.includes('Reel')||f.name.includes('Story')?'max 90s':'max 60s'} · 30fps · Audio AAC</span></div>`).join('')+'<div style="margin-top:10px;font-size:11px;color:#9A8E86">Per comprimere usa HandBrake (gratuito) o carica direttamente — Instagram e TikTok ottimizzano in automatico.</div>';
    expGrid.appendChild(div);
  }
  document.getElementById('btn-media').disabled=false;
  document.getElementById('btn-media').innerHTML='<span>Elabora e genera formati</span>';
  document.getElementById('m-bridge').style.display='block';
}

// ── Build UI ───────────────────────────────────────────────────
function buildUI(){
  const tabsBar=document.getElementById('tabs-bar');
  const mainArea=document.getElementById('main-area');
  TABS.forEach((t,i)=>{
    const tab=document.createElement('div');
    tab.className='tab'+(i===5?' active':''); // content is default
    tab.dataset.id=t.id;
    tab.innerHTML=`<span style="margin-right:5px">${t.icon}</span>${t.label}`;
    tab.onclick=()=>switchTab(t.id);
    tabsBar.appendChild(tab);
    const data=TABS.find(x=>x.id===t.id);
    const panel=buildPanel(t.id,t.icon,`${t.icon} ${t.label}`,DESCS[t.id],PANELS[t.id]);
    if(t.id==='content') panel.classList.add('active');
    mainArea.appendChild(panel);
  });
  // Fix content panel id reference in gusto input
  document.getElementById('g-input') && document.getElementById('g-input').setAttribute('onkeydown','addGusto(event)');
}

// ── Init ───────────────────────────────────────────────────────
buildUI();
